<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcards</title>
  <style>
    /* ── Design tokens ── */
    :root {
      --bg:           #f0f4f8;
      --card-bg:      #ffffff;
      --primary:      #4f6ef7;
      --primary-dark: #3a55d4;
      --danger:       #e05252;
      --danger-dark:  #c43d3d;
      --text:         #1a202c;
      --text-muted:   #718096;
      --border:       #e2e8f0;
      --shadow:       0 4px 20px rgba(0, 0, 0, 0.10);
      --radius:       12px;
      --font:         'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 32px;
      letter-spacing: -0.5px;
    }

    /* ── Add-card form ── */
    .add-form {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      width: 100%;
      max-width: 540px;
      margin-bottom: 36px;
    }

    .add-form h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }

    label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 4px;
      display: block;
    }

    input, textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: var(--font);
      font-size: 0.95rem;
      color: var(--text);
      background: #fafafa;
      transition: border-color 0.15s;
      resize: vertical;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:hover { background: var(--primary-dark); }

    .btn-secondary {
      background: #e2e8f0;
      color: var(--text);
    }
    .btn-secondary:hover { background: #cbd5e0; }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }
    .btn-danger:hover { background: var(--danger-dark); }

    .btn-full { width: 100%; }

    /* ── Flashcard area ── */
    .card-area {
      width: 100%;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* 3-D flip container */
    .card-scene {
      width: 100%;
      height: 220px;
      perspective: 900px;
      cursor: pointer;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.42s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* When flipped, rotate the inner element */
    .card-inner.is-flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      gap: 10px;
    }

    /* The "Back" face starts rotated 180° so it appears when the card flips */
    .card-face.back {
      transform: rotateY(180deg);
      background: #f7f9ff;
    }

    .card-face-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .card-face-text {
      font-size: 1.2rem;
      font-weight: 500;
      text-align: center;
      color: var(--text);
      line-height: 1.5;
    }

    /* Empty state message shown instead of the card */
    .empty-state {
      width: 100%;
      height: 220px;
      background: var(--card-bg);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 1rem;
      font-style: italic;
      text-align: center;
      padding: 24px;
    }

    /* ── Counter ── */
    .card-counter {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ── Navigation controls ── */
    .nav-controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    /* ── Action row (Flip + Delete) ── */
    .action-row {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    .action-row .btn-primary { flex: 1; }
    .action-row .btn-danger  { flex: 0 0 auto; }
  </style>
</head>
<body>

  <h1>Flashcards</h1>

  <!-- ── Add-card form ── -->
  <div class="add-form">
    <h2>Add a Card</h2>
    <div class="field-group">
      <div>
        <label for="input-front">Front (Question)</label>
        <textarea id="input-front" rows="2" placeholder="Type the question…"></textarea>
      </div>
      <div>
        <label for="input-back">Back (Answer)</label>
        <textarea id="input-back" rows="2" placeholder="Type the answer…"></textarea>
      </div>
    </div>
    <button class="btn btn-primary btn-full" id="btn-add">Add Card</button>
  </div>

  <!-- ── Card display area ── -->
  <div class="card-area">

    <!-- Empty state shown when deck is empty -->
    <div class="empty-state" id="empty-state">
      No cards yet — add one above!
    </div>

    <!-- 3-D flip card (hidden when deck is empty) -->
    <div class="card-scene" id="card-scene" style="display:none;" title="Click to flip">
      <div class="card-inner" id="card-inner">
        <div class="card-face front">
          <span class="card-face-label">Front</span>
          <p class="card-face-text" id="card-front-text"></p>
        </div>
        <div class="card-face back">
          <span class="card-face-label">Back</span>
          <p class="card-face-text" id="card-back-text"></p>
        </div>
      </div>
    </div>

    <!-- Counter (hidden when deck is empty) -->
    <p class="card-counter" id="card-counter" style="display:none;"></p>

    <!-- Navigation + action buttons (hidden when deck is empty) -->
    <div class="nav-controls" id="nav-controls" style="display:none;">
      <button class="btn btn-secondary" id="btn-prev">&#8592; Previous</button>
      <button class="btn btn-secondary" id="btn-next">Next &#8594;</button>
    </div>

    <div class="action-row" id="action-row" style="display:none;">
      <button class="btn btn-primary" id="btn-flip">Flip Card</button>
      <button class="btn btn-danger"  id="btn-delete">Delete</button>
    </div>

  </div>

  <script>
    // ── State ──────────────────────────────────────────────
    // deck: array of { front: string, back: string }
    let deck = [];
    let currentIndex = 0; // which card we are viewing

    // ── DOM refs ──────────────────────────────────────────
    const inputFront    = document.getElementById('input-front');
    const inputBack     = document.getElementById('input-back');
    const btnAdd        = document.getElementById('btn-add');

    const emptyState    = document.getElementById('empty-state');
    const cardScene     = document.getElementById('card-scene');
    const cardInner     = document.getElementById('card-inner');
    const cardFrontText = document.getElementById('card-front-text');
    const cardBackText  = document.getElementById('card-back-text');
    const cardCounter   = document.getElementById('card-counter');
    const navControls   = document.getElementById('nav-controls');
    const actionRow     = document.getElementById('action-row');

    const btnPrev   = document.getElementById('btn-prev');
    const btnNext   = document.getElementById('btn-next');
    const btnFlip   = document.getElementById('btn-flip');
    const btnDelete = document.getElementById('btn-delete');

    // ── Render ─────────────────────────────────────────────
    /**
     * Update every part of the UI to reflect the current deck + currentIndex.
     * This is the single source of truth for the display.
     */
    function render() {
      if (deck.length === 0) {
        // Show empty state; hide everything else
        emptyState.style.display  = 'flex';
        cardScene.style.display   = 'none';
        cardCounter.style.display = 'none';
        navControls.style.display = 'none';
        actionRow.style.display   = 'none';
        return;
      }

      // Clamp index in case we just deleted the last card
      if (currentIndex >= deck.length) currentIndex = deck.length - 1;
      if (currentIndex < 0) currentIndex = 0;

      const card = deck[currentIndex];

      // Populate card faces
      cardFrontText.textContent = card.front;
      cardBackText.textContent  = card.back;

      // Always start a newly displayed card showing the front
      cardInner.classList.remove('is-flipped');

      // Update counter — both currentIndex and deck.length are fresh here
      cardCounter.textContent = `Card ${currentIndex + 1} of ${deck.length}`;

      // Show card UI; hide empty state
      emptyState.style.display  = 'none';
      cardScene.style.display   = 'block';
      cardCounter.style.display = 'block';
      navControls.style.display = 'flex';
      actionRow.style.display   = 'flex';
    }

    // ── Event handlers ─────────────────────────────────────

    // Add card
    btnAdd.addEventListener('click', () => {
      const front = inputFront.value.trim();
      const back  = inputBack.value.trim();

      if (!front || !back) {
        alert('Please fill in both the Front and Back fields before adding a card.');
        return;
      }

      deck.push({ front, back });

      // Jump to the newly added card (Prompt 1.3 requirement)
      currentIndex = deck.length - 1;

      // Clear form inputs
      inputFront.value = '';
      inputBack.value  = '';

      render();
    });

    // Flip — clicking the card scene or the Flip button both work
    function flipCard() {
      cardInner.classList.toggle('is-flipped');
    }
    cardScene.addEventListener('click', flipCard);
    btnFlip.addEventListener('click', flipCard);

    // Navigate previous
    btnPrev.addEventListener('click', () => {
      // If only one card, stay put (Prompt 1.3 requirement)
      if (deck.length <= 1) return;
      currentIndex = (currentIndex - 1 + deck.length) % deck.length;
      render();
    });

    // Navigate next
    btnNext.addEventListener('click', () => {
      if (deck.length <= 1) return;
      currentIndex = (currentIndex + 1) % deck.length;
      render();
    });

    // Delete current card
    btnDelete.addEventListener('click', () => {
      if (deck.length === 0) return;

      // Remove the card at currentIndex
      deck.splice(currentIndex, 1);

      // After deletion, currentIndex stays the same so we land on the "next"
      // card. render() will clamp it if we deleted the last item.
      render();
    });

    // ── Initial render (empty state on load) ───────────────
    render();
  </script>

</body>
</html>
